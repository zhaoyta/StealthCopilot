name: Feature Request
description: 提议新功能或改进现有功能
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        欢迎提交功能建议！请描述你想要的功能及其使用场景。

  - type: textarea
    id: problem
    attributes:
      label: 需求背景
      description: 这个功能要解决什么问题或满足什么需求？
      placeholder: 我每次面试前都需要手动切换简历，希望能一键切换…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你希望如何实现这个功能？
      placeholder: 在提词窗顶部增加简历快捷切换下拉框…
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些其他方案？

  - type: dropdown
    id: priority
    attributes:
      label: 重要程度
      options:
        - 极高（严重影响核心使用场景）
        - 高（常用功能缺失）
        - 中（改善体验）
        - 低（锦上添花）
    validations:
      required: true
