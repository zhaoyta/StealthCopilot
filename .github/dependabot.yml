version: 2

updates:
  # Go modules 依赖自动升级
  - package-ecosystem: gomod
    directory: /stealthcopilot
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    labels:
      - deps
      - go
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  # pnpm / npm 依赖自动升级（前端）
  - package-ecosystem: npm
    directory: /stealthcopilot/frontend
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    labels:
      - deps
      - frontend
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  # GitHub Actions 自身版本升级
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Shanghai
    labels:
      - deps
      - ci
    commit-message:
      prefix: "chore(ci)"
    open-pull-requests-limit: 3
