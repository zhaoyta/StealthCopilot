name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-mac:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: stealthcopilot/go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: stealthcopilot/frontend
        run: npm ci

      - name: Build macOS app
        working-directory: stealthcopilot
        run: wails build -clean -platform darwin/amd64
        env:
          CGO_ENABLED: '1'

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: stealthcopilot-macos
          path: stealthcopilot/build/bin/

  build-win:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: stealthcopilot/go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MSYS2 / mingw64 (CGO)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: stealthcopilot/frontend
        run: npm ci

      - name: Build Windows app
        working-directory: stealthcopilot
        run: wails build -clean -platform windows/amd64
        env:
          CGO_ENABLED: '1'
          CC: x86_64-w64-mingw32-gcc

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: stealthcopilot-windows
          path: stealthcopilot/build/bin/
