# docs-check.yml — 强制 feat/fix PR 必须包含文档更新
# 触发：PR 创建或更新
# 原则：新功能和 Bug 修复必须同步更新 docs/ 目录

name: Docs Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  docs-check:
    name: 检查文档更新
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以分析 commit message

      - name: 检测 feat/fix commit 是否包含文档更新
        run: |
          # 获取 PR 中所有 commit message
          COMMITS=$(git log origin/${{ github.base_ref }}..HEAD --format="%s")
          echo "PR commits:"
          echo "$COMMITS"

          # 检查是否有 feat: 或 fix: 类型的提交
          HAS_FEAT_FIX=$(echo "$COMMITS" | grep -E "^(feat|fix)(\(.+\))?!?:" || true)

          if [ -z "$HAS_FEAT_FIX" ]; then
            echo "✓ 无 feat/fix 提交，跳过文档检查"
            exit 0
          fi

          echo "检测到 feat/fix 提交，检查 docs/ 目录是否有变更..."

          # 检查 docs/ 目录是否有变更
          DOCS_CHANGED=$(git diff origin/${{ github.base_ref }}..HEAD --name-only | grep "^docs/" || true)

          if [ -z "$DOCS_CHANGED" ]; then
            echo "❌ PR 包含 feat/fix 提交但未更新 docs/ 目录"
            echo ""
            echo "feat/fix 提交："
            echo "$HAS_FEAT_FIX"
            echo ""
            echo "请更新 docs/ 目录中的相关帮助文档后重新提交。"
            exit 1
          fi

          echo "✓ 文档已更新："
          echo "$DOCS_CHANGED"
