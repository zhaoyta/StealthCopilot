# lint.yml — Go + Vue/TS 代码质量检查
# 触发：PR 创建或更新
# 任一 lint 失败则阻断 PR 合并

name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: 运行 golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        run: npm ci
        working-directory: frontend

      - name: 运行 ESLint
        run: npm run lint
        working-directory: frontend
