# git-cliff 配置 — Conventional Commits → CHANGELOG 自动生成
# 文档：https://git-cliff.org/docs/configuration

[changelog]
# CHANGELOG 头部说明
header = """
# Changelog

所有版本变更记录遵循 [Conventional Commits](https://www.conventionalcommits.org/zh-hans/) 规范。\n
"""
# 每个版本条目的模板
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

# commit 分组映射（type → 中文分类名）
commit_parsers = [
  { message = "^feat", group = "新功能" },
  { message = "^fix", group = "Bug 修复" },
  { message = "^perf", group = "性能优化" },
  { message = "^refactor", group = "代码重构" },
  { message = "^docs", group = "文档", skip = true },
  { message = "^style", group = "代码格式", skip = true },
  { message = "^test", group = "测试", skip = true },
  { message = "^chore", group = "杂项", skip = true },
  { message = "^ci", group = "CI", skip = true },
]

# 只处理带版本 tag 的提交
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
